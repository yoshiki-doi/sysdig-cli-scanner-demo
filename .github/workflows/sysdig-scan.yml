name: Build and Sysdig Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: security-playground
  IMAGE_TAG: ${{ github.sha }}
  SYSDIG_SECURE_URL: https://app.au1.sysdig.com
  CLI_SCANNER_VERSION: "1.26.0"
  SEVERITY_AT_LEAST: high
  EXTRA_PARAMETERS: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Save Docker image
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  scan-strict:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          docker load -i image.tar

      - name: Sysdig CLI Scanner - Strict
        id: scan
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          sysdig-secure-token: ${{ secrets.SYSDIG_SECURE_TOKEN }}
          sysdig-secure-url: ${{ env.SYSDIG_SECURE_URL }}
          cli-scanner-version: ${{ env.CLI_SCANNER_VERSION }}
          stop-on-failed-policy-eval: true
          severity-at-least: ${{ env.SEVERITY_AT_LEAST }}
          extra-parameters: ${{ env.EXTRA_PARAMETERS }}

      - name: Upload SARIF report
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ github.workspace }}/sarif.json
          category: scan-strict

  scan-permissive:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          docker load -i image.tar

      - name: Sysdig CLI Scanner - Permissive
        id: scan
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          sysdig-secure-token: ${{ secrets.SYSDIG_SECURE_TOKEN }}
          sysdig-secure-url: ${{ env.SYSDIG_SECURE_URL }}
          cli-scanner-version: ${{ env.CLI_SCANNER_VERSION }}
          stop-on-failed-policy-eval: false
          severity-at-least: ${{ env.SEVERITY_AT_LEAST }}
          extra-parameters: ${{ env.EXTRA_PARAMETERS }}

      - name: Upload SARIF report
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ github.workspace }}/sarif.json
          category: scan-permissive
